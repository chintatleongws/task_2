services:
  scraper:
    build: .
    container_name: scraper
    environment:
      BRIGHTDATA_API_KEY: ${BRIGHTDATA_API_KEY}
      STORAGE_MODE: ${STORAGE_MODE}
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: scraper_db
      DB_USER: postgres
      DB_PASSWORD: password
    volumes:
      - ./data:/scraper/data
    depends_on:
      - database

  database:
    image: postgres:latest  # should be a fixed version for production
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scraper_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data: